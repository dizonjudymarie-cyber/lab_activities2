<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account</title>
    <link rel="stylesheet" href="style.css">
</head
>
<body>
<header>
    <h1>Welcome to Judella Store, Maria</h1>
    <nav aria-label="User Account Navigation">
        <ul>
            <li><a href="#orders">Order History</a></li>
            <li><a href="#profile">Profile Settings</a></li>
            <li><a href="#wishlist">Wishlist</a></li>
        </ul>
    </nav>
</header>

<main>
<section id="orders">
    <h2>Order History</h2>
    <details>
        <summary>Order #1001 – January 20, 2026</summary>
        <ul>
            <li>1x Smartphone X</li>
            <li>Total: <span class="price">499.99</span></li>
            <li>Status: Delivered</li>
        </ul>
    </details>
</section>

<section id="profile">
    <h2>Profile Settings</h2>
    <form>
        <div>
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" value="Maria" required>
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="maria@example.com" required>
        </div>
        <div>
            <button type="submit">Update Profile</button>
        </div>
    </form>
</section>

<section id="wishlist">
    <h2>Wishlist</h2>
    <ul>
        <li>Smartwatch</li>
        <li>Wireless Earbuds</li>
        <li>Summer Dress</li>
    </ul>
</section>
</main>
</body>
</html>
