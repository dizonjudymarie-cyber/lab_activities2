<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart - ShopEasy</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<main>
<h1>Shopping Cart</h1>

<section aria-label="Cart Items">
    <ul>
        <li>
            <img src="shein1.jpg" alt="Smartphone X">
            <h3>Dress</h3>
            <p>Php. 99.99</p>
            <label>
                Quantity:
                <input type="number" min="1" value="1">
            </label>
        </li>
    </ul>
</section>

<section>
    <h2>Subtotal</h2>
    <p>Php. 99.99</p>
</section>

<a href="task5.htm" role="button" class="checkout-btn">Proceed to Checkout</a>

<section aria-live="polite">
    <p>Your cart is currently empty.</p>
</section>

</main>

</body>
</html>
